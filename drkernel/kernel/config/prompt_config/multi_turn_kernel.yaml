method: system
prompt: null

per_turn_prompts:
  - name: first_turn
    condition: "current_turn == 0"
    history_mode: all
    skip_env: 0.0
    response_truncation: python_code, answer_code
    template: null
  - name: tool_response
    condition: "make_up_tool_response == True"
    history_mode: all
    skip_env: 0.0
    response_truncation: python_code, answer_code
    update_memory: false
    template: |
      Now you have received the server feedback for your last implementation. Based on that and all your previous responses, improve the implementation.

      Here is the server feedback. Please refer to this feedback to improve the implementation:
      Server feedback (status/metrics/errors):
      {feedback}

      Important evaluation constraints:
      - Evaluation uses CUDA and focuses on the provided benchmark setting.
      - Do not add fallback branches to PyTorch implementations.
      - Do not gate Triton execution on `self.training`, `self.bn.training`,
      `torch.is_grad_enabled()`, or any tensor's `requires_grad`.
      - Do not add conditional logic such as "if training/use torch else use Triton".
      - Provide a direct Triton-based implementation for the benchmarked forward path.
      - Keep the implementation simple and focused on the evaluated case.

      Return an improved Triton implementation named `ModelNew` as a single ```python``` block. Let's think step by step.
